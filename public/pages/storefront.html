<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse the Books — Author Name</title>
<meta name="description" content="Browse the full catalog of ebooks, direct from the author. Secure checkout, instant download.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Token file loads first, then base/shared, then this page's own rules -->
<link rel="stylesheet" href="../assets/css/variables.css">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/storefront.css">
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="../index.html" class="brand">Author<span>Shelf</span></a>
    <nav class="nav-links">
      <a href="../index.html">Home</a>
      <a href="storefront.html">Books</a>
      <a href="about.html">About</a>
    </nav>
    <a href="cart.html" class="btn btn-secondary nav-cta cart-link">
      Cart <span class="cart-count" id="cart-count">0</span>
    </a>
  </div>
</header>

<main>

  <!-- ============ CATALOG HEADER ============ -->
  <section class="section catalog-head">
    <div class="container">
      <span class="eyebrow">The full shelf</span>
      <h1>All books</h1>
      <p class="catalog-sub">Every title available for instant download, straight from the author.</p>
    </div>
  </section>

  <!-- ============ CATALOG CAROUSEL ============ -->
  <!-- Populated from BOOKS in assets/js/books-data.js — see storefront.js.
       Horizontal scroll-snap carousel: swipe on mobile, arrow buttons
       on desktop. Same .book-card markup as the grid used to have. -->
  <section class="section catalog">
    <div class="container catalog-carousel">
      <div class="catalog-nav">
        <button class="catalog-nav-btn" id="catalog-prev" aria-label="Previous book">&#8592;</button>
        <button class="catalog-nav-btn" id="catalog-next" aria-label="Next book">&#8594;</button>
      </div>
      <div class="book-grid catalog-grid" id="catalog-grid">
        <!-- book cards injected here by storefront.js -->
      </div>
      <div class="catalog-dots" id="catalog-dots"></div>
    </div>
  </section>

</main>

<footer class="site-footer">
  <div class="container">
    <div class="footer-cta">
      <h2>Support the author directly</h2>
      <a href="about.html" class="btn btn-primary">Meet the Author</a>
    </div>
    <div class="footer-grid">
      <a href="../index.html" class="brand">Author<span>Shelf</span></a>
      <nav class="footer-links">
        <a href="about.html">About</a>
        <a href="privacy.html">Privacy</a>
        <a href="terms.html">Terms</a>
        <a href="lookup-order.html">Look Up Order</a>
      </nav>
    </div>
    <p class="footer-bottom">&copy; 2026 Author Name. All rights reserved.</p>
  </div>
</footer>

<script src="../assets/js/books-data.js"></script>
<script src="../assets/js/cart.js"></script>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/storefront.js"></script>
</body>
</html>
