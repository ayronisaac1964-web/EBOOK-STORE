<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders — Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="admin">
  <div class="admin-shell">
    <nav class="admin-nav">
      <span class="brand">AuthorShelf</span>
      <a href="dashboard.html">Dashboard</a>
      <a href="add-book.html">Add a Book</a>
      <a href="edit-books.html">Manage Books</a>
      <a href="orders.html" aria-current="page">Orders</a>
      <button class="admin-logout" id="admin-logout">Log out</button>
    </nav>

    <main class="admin-main">
      <div class="admin-header">
        <h1>Orders</h1>
      </div>

      <div id="orders-message"></div>

      <table class="admin-table">
        <thead>
          <tr>
            <th>Email</th>
            <th>Items</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Date</th>
            <th>Reference</th>
          </tr>
        </thead>
        <tbody id="orders-body">
          <tr><td colspan="6">Loading…</td></tr>
        </tbody>
      </table>
    </main>
  </div>

  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/admin-auth.js"></script>
  <script src="../assets/js/admin-orders.js"></script>
</body>
</html>
